services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: task_tracker
      MYSQL_USER: tracker
      MYSQL_PASSWORD: tracker_password
      MYSQL_ROOT_PASSWORD: root_password
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot_password"]
      interval: 10s
      timeout: 5s
      retries: 10

  phpmyadmin:
    image: phpmyadmin:5.2-apache
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_USER: tracker
      PMA_PASSWORD: tracker_password
      UPLOAD_LIMIT: 64M
    ports:
      - "8080:80"
    depends_on:
      mysql:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    env_file:
      - ./backend/.env.docker
    environment:
      DB_HOST: mysql
      REDIS_URL: redis://redis:6379
      FRONTEND_URL: http://localhost:5174
      API_BASE_URL: http://localhost:4000
    ports:
      - "4000:4000"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started

  frontend:
    build: ./frontend
    environment:
      VITE_API_URL: http://localhost:4000/api
    ports:
      - "5174:80"
    depends_on:
      - backend

volumes:
  mysql_data:
